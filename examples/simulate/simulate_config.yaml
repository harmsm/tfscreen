
# ---------------------------------------------------------------------------
# Library genetic information
# ---------------------------------------------------------------------------

# Reading frame 0, 1, 2. No reverse (negative) strand allowed.
reading_frame: 0

# Amino acid residue number for the first in-frame residue of the amplicon.
first_amplicon_residue: 27

# Wildtype DNA sequence of the amplicon.
wt_seq: gccagccacgtttctgcgaaaacgcgggaaaaagtggaagcggcgatggcggagctgaattacattcccaaccgcgtggcacaacaactggcgggcaaacagtcgttgctgattggcgttgccacctccagtctggccctgcacgcgccgtcgcaaattgtcgcggcgattaaatctcgcgccgatcaactgggtgccagcgtggtggtgtcgatg

# Degenerate codon pattern for library positions.  '.' = wildtype; 'nnt' = NNT
# codon (encodes all 20 amino acids + stop with reduced synonymous redundancy).
# Must be the same length as wt_seq.
degen_sites: ......nntnnt.............................................................................................nntnnt.........................................................................................................

# tiles groups contiguous degenerate positions that were cloned together.
# '.' = wildtype; any other character defines a tile block.  Blocks must
# be contiguous (......111... ok; ....11.1... not ok).
tiles: ......111111.............................................................................................222222.........................................................................................................

# Flanking sequences immediately upstream and downstream of the amplicon.
expected_5p: cgcgtggtgaaccag
expected_3p: gtagaacgaagcggc

# Which genotype classes to include in the library.  'single-x' = all
# single-mutation variants in tile x.  'double-x-y' = all pairwise
# combinations between tiles x and y.  'double-x-x' = internal
# doubles within tile x.
tile_combos: ["single-1", "single-2", "double-1-2"]

# Control sequences (e.g. known variants) added as spikes.  Must be the same
# length as wt_seq.
spiked_seqs:
- gccagccacgtttctgcgaaaacgcgggaaaaagtggaagcggcgatggcggagctgaattacattcccaaccgcgtggcacaacaactggcgggcaaacagtcgttgctgattggcgttgccacctccagtctggccctggcggcgccgtcgcaaattgtcgcggcgattctgtctcgcgccgatcaactgggtgccagcgtggtggtgtcgatg  # k84l
- gccagccacgtttctgcgaaaacgcgggaaaaagtggaagcggcgattgcggagctgaattacattcccaaccgcgtggcacaacaactggcgggcaaacagtcgttgctgattggcgttgccacctccagtctggccctgcacgcgccgtcgcaaattgtcgcggcgattctgtctcgcgccgatcaactgggtgccagcgtggtggtgtcgatg  # m42i/k84l

# ---------------------------------------------------------------------------
# Phenotype calculation
# ---------------------------------------------------------------------------

# Registered theta component name.  Any key in model_registry["theta"] is
# valid except "_simple" (calibration-only).
#
# Thermodynamic components (physics-based operator-occupancy model):
#   "thermo.O2_C12_K5_U0_a.PK"   — dimer with operator architecture O2, 12-mer
#                                   cooperative lattice, 5 binding sites, etc.
#   (other thermo.* keys available — see model_registry)
#
# Perturbation-based components (wildtype reference + per-genotype perturbations):
#   "hill_geno"   — per-genotype Hill equation; each genotype's (theta_low,
#                   theta_high, K, n) drawn independently around a WT reference.
#                   Supports four phenotype categories: normal, stuck-bound,
#                   never-binds, inverted-logic.
#   "hill_mut"    — mutation-decomposed Hill equation; per-mutation additive
#                   deltas in transformed parameter space, assembled via
#                   matrix multiplication.  Pairwise epistasis sampled from a
#                   regularized horseshoe prior when the library includes
#                   double mutants.  Wildtype genotype always receives the
#                   exact reference curve.
#
# Perturbation-based components ignore theta_priors and instead use
# theta_sim_priors (see below).  They do not call define_model; tfs-simulate
# will fall back to prior-predictive sampling only for components that lack a
# simulate() function.
theta_component: "thermo.O2_C12_K5_U0_a.PK"

# Optional: path to structural/thermodynamic data file required by PnnC and
# PddG theta components.  Omit (or set to null) for all other models.
#   .h5 / .hdf5  → HDF5 structural ensemble (PnnC)
#   .csv         → per-mutation per-structure ddG prior means (PddG)
# thermo_data: null

# Optional: overrides for the theta component's default model hyperparameters.
# Any key returned by the component's get_hyperparameters() can be overridden.
# Used by thermodynamic/hierarchical components; ignored when theta_component
# is "hill_geno" or "hill_mut" (those use theta_sim_priors instead).
# Omit this block to use all component defaults.
# theta_priors:
#   theta_tf_total_M: 3.3e-7

# Optional: overrides for perturbation-based simulation priors (SimPriors).
# Used only when theta_component is "hill_geno" or "hill_mut".
# Any key returned by the component's get_sim_hyperparameters() can be overridden.
# Omit this block to use all component defaults.
#
# --- hill_geno SimPriors keys ---
# Wildtype reference curve (a full-range decreasing Hill curve by default):
#   wt_theta_low:       0.99    # theta at zero ligand (near fully bound)
#   wt_theta_high:      0.01    # theta at saturating ligand (near unbound)
#   wt_log_K:          -4.1    # ln(K_D in mM); sets midpoint (lac/IPTG default)
#   wt_hill_n:          2.0    # Hill coefficient (cooperativity)
# Per-genotype Normal perturbation widths (in logit/log space):
#   sigma_logit_low:    0.5    # spread on logit(theta_low)
#   sigma_logit_delta:  0.5    # spread on logit_delta = logit_high − logit_low
#   sigma_log_K:        0.5    # spread on log(K) — primary binding-affinity effect
#   sigma_log_n:        0.3    # spread on log(hill_n)
# Mixture fractions for special phenotype categories (must sum to < 1;
# remainder is "normal"):
#   p_stuck_bound:      0.05   # fraction whose theta ≈ 1 everywhere
#   p_never_binds:      0.05   # fraction whose theta ≈ 0 everywhere
#   p_inverted:         0.02   # fraction with inverted logic (theta rises with ligand)
#
# --- hill_mut SimPriors keys ---
# Wildtype reference (shared with hill_geno defaults):
#   wt_theta_low:         0.99
#   wt_theta_high:        0.01
#   wt_log_K:            -4.1
#   wt_hill_n:            2.0
# Per-mutation delta widths (additive in logit/log space):
#   sigma_d_logit_low:    0.3
#   sigma_d_logit_delta:  0.5
#   sigma_d_log_K:        0.5    # largest effect — primarily shifts binding affinity
#   sigma_d_log_n:        0.3
# Pairwise epistasis (regularized horseshoe; used when library has doubles):
#   epi_tau_scale:        0.1    # HalfCauchy scale for global sparsity τ
#                                 # set to 0.0 for exactly no epistasis
#   epi_slab_scale:       2.0    # typical large-epistasis effect size
#   epi_slab_df:          4.0    # InvGamma slab degrees of freedom
#
# Example — stress-test epistasis recovery:
# theta_sim_priors:
#   epi_tau_scale: 1.0     # strong, dense epistasis
#
# Example — simulate with no epistasis at all:
# theta_sim_priors:
#   epi_tau_scale: 0.0

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------

# Each block defines one set of growth conditions.  The Cartesian product of
# titrant_conc × t_sel gives one sample per entry.  condition_pre and
# condition_sel must also appear as keys in the 'growth' section below.
condition_blocks:
  - library: "kanR"
    titrant_name: "iptg"
    titrant_conc: [0, 0.0001, 0.001, 0.003]
    condition_pre: "kanR-kan"
    t_pre: 30
    condition_sel: "kanR+kan"
    t_sel: [160, 180, 200]

  - library: "kanR"
    titrant_name: "iptg"
    titrant_conc: [0.01, 0.03, 0.1, 1.0]
    condition_pre: "kanR-kan"
    t_pre: 30
    condition_sel: "kanR+kan"
    t_sel: [145, 165, 180]

  - library: "pheS"
    titrant_name: "iptg"
    titrant_conc: [0, 0.0001, 0.001, 0.003, 0.01, 0.03, 0.1, 1.0]
    condition_pre: "pheS-4CP"
    t_pre: 30
    condition_sel: "pheS+4CP"
    t_sel: [95, 110, 125]

# ---------------------------------------------------------------------------
# Growth rate parameters
# ---------------------------------------------------------------------------

# Linear mapping from operator occupancy (theta) to growth rate k for each
# condition:  k = m * theta + b.  Every condition_pre and condition_sel that
# appears in condition_blocks must have an entry here, and vice versa.
growth:
  kanR+kan: {m: -0.009933, b: 0.000000}
  kanR-kan: {m:  0.000808, b: 0.004670}
  pheS+4CP: {m:  0.006226, b: 0.010741}
  pheS-4CP: {m: -0.000344, b: 0.017862}

# Per-genotype pleiotropic growth cost is sampled from a shifted lognormal:
#   dk_geno = hyper_shift - exp(Normal(hyper_loc, hyper_scale))
# Most variants are mildly deleterious; a short right tail (at most hyper_shift)
# allows beneficial mutations.  Matches the hierarchical tfmodel inference prior.
dk_geno_hyper_loc: -3.5
dk_geno_hyper_scale: 1.0
dk_geno_hyper_shift: 0.02
# Set dk_geno_zero: true to pin every genotype's dk_geno to 0, skipping the
# stochastic draw above.  When set, the three dk_geno_hyper_* keys are optional.
# dk_geno_zero: true

# Per-genotype TF activity (A) — a scalar that multiplies the theta contribution
# to growth: k = b + A * m * theta.  The wild-type is fixed at activity_wt=1.0
# by inference convention.  Set activity_mut_scale > 0 to draw each mutant
# genotype's log(A) independently from Normal(log(activity_wt), activity_mut_scale).
# activity_mut_scale=0 (default) gives all genotypes identical activity, matching
# the 'fixed' activity inference component.
activity_wt: 1.0
activity_mut_scale: 0.0

# ---------------------------------------------------------------------------
# Experimental simulation parameters
# ---------------------------------------------------------------------------

# Number of transformants per tile combo.  Keys must match the entries in
# tile_combos (e.g. 'single-1', 'double-1-2') plus 'spiked'.
transform_sizes:
  single-1: 100_000
  single-2: 100_000
  double-1-2: 300_000
  spiked: 1_000

# Mixing ratio of tile combos in the pooled library.  Only the ratio matters.
library_mixture:
  single-1: 100
  single-2: 100
  double-1-2: 1000
  spiked: 1

# Sigma of the log-normal used to draw initial genotype frequencies.  0 = flat
# distribution; 1–2 is realistic for a typical transformation.
lib_assembly_skew_sigma: 1.5

# Each bacterium receives a number of plasmids drawn from a zero-truncated
# Poisson with this lambda.  Set to 0 or null for exactly one plasmid per cell.
transformation_poisson_lambda: 1.5

# When a cell carries multiple plasmids, growth rates are combined via this
# function.  Recommended: 'min' for repressors of antibiotic resistance (tightest
# binder dominates); 'max' for inducers.  Default: 'mean' for all libraries.
multi_plasmid_combine_fcn:
  kanR: "min"
  pheS: "max"

# Colony-forming units per mL at the start of pre-growth.
cfu0: 65_000_000.0

# Per-tube environmental growth-rate noise (hr⁻¹).  Each physical tube gets its
# own delta_k ~ Normal(0, tube_noise_sigma); the kt contribution per tube is
# delta_k * (t_pre + t_sel), shared by all genotypes in that tube.  A value of
# ~0.001–0.002 hr⁻¹ is typical for well-controlled liquid cultures.
# Set to 0 or null to disable.
tube_noise_sigma: 0.002

# ---------------------------------------------------------------------------
# Growth transition model (optional)
# ---------------------------------------------------------------------------

# Models the lag phase when bacteria switch from pre-selection to selection medium.
# Every condition_pre in condition_blocks must have an entry.  Use model: "instant"
# for conditions with no detectable lag.  Omit this block to use instant everywhere.
#
# "memory" model:  tau = tau0 + k1 / (theta + k2)
#   tau0 = baseline lag (minutes)
#   k1   = occupancy-dependence of lag (higher = more effect)
#   k2   = curvature constant (> 0; prevents division by zero)
growth_transition:
  - condition_pre: "pheS-4CP"
    model: "memory"
    tau0: 90.0
    k1: 5.0
    k2: 0.2

  - condition_pre: "kanR-kan"
    model: "memory"
    tau0: 60.0
    k1: 2.0
    k2: 0.2

# ---------------------------------------------------------------------------
# Data collection parameters
# ---------------------------------------------------------------------------

# Total sequencing reads across all samples.
total_num_reads: 25_000_000

# Fraction of reads re-assigned to a randomly chosen genotype (index hopping).
# Set to 0 or null to disable.
prob_index_hop: 0.05

# Random seed for reproducibility.  Set to null for a random seed each run.
seed: null

# ---------------------------------------------------------------------------
# Binding data simulation (optional)
# ---------------------------------------------------------------------------

# If present, tfs-simulate also writes a binding CSV with per-genotype theta
# curves.  titrant_name must match e_name in observable_calc_kwargs.
#
# binding_data:
#   genotypes:
#     - wt
#     - A47V
#   titrant_name: iptg
#   titrant_conc: [0, 0.0001, 0.001, 0.003, 0.01, 0.03, 0.1, 0.3, 1.0]
#   noise: 0.02

# ---------------------------------------------------------------------------
# Pre-split data simulation (optional)
# ---------------------------------------------------------------------------

# tfs-simulate writes a presplit CSV when a 'presplit_data' key is present
# in this file.  To enable it, ADD the following lines (uncommented) anywhere
# at the top level of this config — for example, right here:
#
#   presplit_data:
#     noise: 0.0
#
# The 'noise' sub-key is optional; omitting it (or setting noise: 0.0) uses
# sequencing-count uncertainty only.  The minimal activation is just:
#
#   presplit_data:
#
# ---- What the presplit CSV represents -------------------------------------
# This simulates the sequencing aliquot taken at t = -t_pre, just before
# the culture is split into titrant-concentration conditions.  Because it is
# taken before any pre-selection growth, each ln_cfu value directly
# constrains ln_cfu0 in the hierarchical model.
#
# Output columns: replicate, condition_pre, genotype, ln_cfu, ln_cfu_std,
#                 ln_cfu_0_true (ground truth for validation).
# One row per (replicate, condition_pre, genotype).
#
# Pass the resulting file to tfs-configure-model with --presplit_df.
#
# noise (float, default 0): extra Gaussian noise on the ln-scale, added on
#   top of sequencing-count uncertainty.  Useful for benchmarking.
