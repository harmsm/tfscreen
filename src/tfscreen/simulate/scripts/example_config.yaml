###### ensemble-epistasis-engine calculation ########
## Simple model has no nonlinear interactions between terms. probably a bad
## model...
## spreadsheet defining ensemble and interactions with iptg
# observable_calculator: "eee"
# observable_calc_kwargs:
#   ensemble_spreadsheet: "../input/ensemble.xlsx"
#   T: 310       # K
#   R: 0.001987  # kcal/mol/K
#   # This sets how the thermodynamic variable maps proportionally to output. For
#   # the lac repressor, this is 12 because we derived the thermodynamic
#   # parameters under conditions where there was a 12-fold excess of the lac
#   # repressor to operator. Fully bound lac repressor thus corresponds to a
#   # an observable value of 1/12 in the operator-bound state--hence 12 here.
#   scale_obs_by: 12
#   e_name: "iptg"  # name of effector in conditions. (only one allowed)

# Spreadsheet with effects of all mutations on each state in ensemble
ddG_spreadsheet: "ddG_ensemble_clean_with_effector.csv"

# -----------------------------------------------------------------------------
# Conditions

# condition_blocks is a list of dictionaries defining different growth
# conditions. Each dictionary should have a "marker" key with a value of either
# "kanR" or "pheS", a "select" key with a value of either 0 or 1, an "iptg"
# key with a list of iptg concentrations (in mM), and a "time" key with a list
# of sample times (in minutes)
condition_blocks:
  - library: "pheS"
    titrant_name: "iptg"
    titrant_conc: [0, 1]
    condition_pre: "pheS-4CP"
    t_pre: 30
    condition_sel: "pheS-4CP"
    t_sel: [80, 95, 110]

  - library: "kanR"
    titrant_name: "iptg"
    titrant_conc: [0, 1]
    condition_pre: "kanR-kan"
    t_pre: 30
    condition_sel: "kanR-kan"
    t_sel: [80, 95, 110]

  - library: "kanR"
    titrant_name: "iptg"
    titrant_conc: [0, 0.0001, 0.001, 0.003]
    condition_pre: "kanR-kan"
    t_pre: 30
    condition_sel: "kanR+kan"
    t_sel: [160, 180, 200]

  - library: "kanR"
    titrant_name: "iptg"
    titrant_conc: [0.01, 0.03, 0.1, 1.0]
    condition_pre: "kanR-kan"
    t_pre: 30
    condition_sel: "kanR+kan"
    t_sel: [145, 165, 180]

  - library: "pheS"
    titrant_name: "iptg"
    titrant_conc: [0, 0.0001, 0.001, 0.003, 0.01, 0.03, 0.1, 1.0]
    condition_pre: "pheS-4CP"
    t_pre: 30
    condition_sel: "pheS+4CP"
    t_sel: [95, 110, 125]

# -----------------------------------------------------------------------------
# Phenotype calculation parameters

# Describes how bacteria grow under different conditions as a function of
# operator occupancy. For each condition (matching condition_pre and
# condition_sel values in condition_blocks), provide slope m and intercept b
# for the linear model:
#
#   k = m * theta + b
#
# where k is the wildtype growth rate and theta is operator occupancy.
# Every condition that appears in condition_blocks must have an entry here,
# and every entry here must appear in condition_blocks.
growth:
  kanR+kan:  {m: -0.009933, b: 0.000000}
  kanR-kan:  {m:  0.000808, b: 0.004670}
  pheS+4CP:  {m:  0.006226, b: 0.010741}
  pheS-4CP:  {m: -0.000344, b: 0.017862}

# We assign pleiotropic growth-rate effects (dk_geno) to each genotype by
# sampling a per-mutation cost from a gamma distribution and summing across
# mutations. The formula is:
#
#   dk_geno = (scale/2) - Gamma(shape, scale)
#
# so the distribution is centered slightly below zero (most mutations are
# mildly deleterious) with a short right tail (a few beneficial variants).
# Increasing mut_growth_rate_scale widens the distribution in both directions,
# producing more dead variants and more fast-growers simultaneously. Changing
# mut_growth_rate_shape adjusts the skew of the gamma while keeping the scale
# fixed.
#
# Example reference points (approximate, condition-dependent):
#   shape=3, scale=0.002 (defaults): ~0.2% dead, ~1.4% faster than wt,
#                                     fastest ~5% above wt growth rate
#   shape=3, scale=0.02:             ~81% dead, fastest ~50% above wt
#   shape=3, scale=0.0002:           ~0% dead, fastest ~0.4% above wt
mut_growth_rate_shape: 3
mut_growth_rate_scale: 0.002

# -----------------------------------------------------------------------------
# Experimental simulation information

# Define how many transformants to include for each sub-library. Keys are
# strings: '1' means O1; '2' means O2; '12' means O1/O2.
# if you set internal_doubles to True above, you can then add '11' and
# '22' to get the doubles within each pool.
transform_sizes:
  single-1: 1.0e5
  single-2: 1.0e5
  double-1-2: 3.0e5
  spiked: 1.0e3

# what is the mixture ratio of the library. This works together with
# sizes. For the example values, the final mixed library would have 1e5 * 1
# O1, 1e5 * 1, O2, and and 1e6 * 10 O1/O2. Note that the **ratio** matters,
# not the absolute value.
library_mixture:
  single-1: 100
  single-2: 100
  double-1-2: 1000
  spiked: 1

# sigma value to give to log normal distribution for generating genotype
# frequencies in the library. 0 gives an even distribution; higher numbers
# give greater skew (meaning some genotypes have very high frequency).
# 1-2 is a good guess for a real library.
lib_assembly_skew_sigma: 1.5

# The number of plasmids per cell is set by sampling from a zero-truncated
# Poisson distribution with this lambda. If 0 or None, each cell gets exactly
# one plasmid.
transformation_poisson_lambda: 1.5

# How to combine growth rates when a cell contains multiple plasmids. Valid
# options are: min, max, mean, gmean, sum. Keys must match the library names
# in condition_blocks. If this key is omitted, "mean" is used for all
# libraries. For a repressor of an antibiotic resistance gene we recommend
# "min" (the tightest-binding plasmid dominates). For an inducer of antibiotic
# resistance we recommend "max".
multi_plasmid_combine_fcn:
  kanR: "min"
  pheS: "max"

# cfu/mL at start of pre-growth
cfu0: 6.5e7

# Per-tube environmental growth-rate noise (hr⁻¹).  Each physical tube gets its
# own delta_k ~ Normal(0, tube_noise_sigma); the kt contribution per tube is
# delta_k * (t_pre + t_sel), shared by all genotypes in that tube.  A value of
# ~0.001–0.002 hr⁻¹ is typical for well-controlled liquid cultures.
# Set to 0 or null to disable.
tube_noise_sigma: 0.002

# -----------------------------------------------------------------------------
# Growth transition model

# When bacteria switch from pre-selection to selection medium there is a lag
# before they reach their new growth rate. The simulation can model this with
# the "memory" model:
#
#   tau = tau0 + k1 / (theta + k2)
#
# where theta is operator occupancy (0–1), tau is the lag time (minutes),
# tau0 is a baseline lag independent of occupancy, k1 scales the
# occupancy-dependence of the lag, and k2 prevents division by zero (must
# be > 0). Bacteria grow at k_pre for the first min(t_sel, tau) minutes of
# selection, then switch to k_sel.
#
# Higher theta (more TF bound) reduces tau when k1 > 0, meaning bacteria
# with higher occupancy adapt more quickly.
#
# Every condition_pre that appears in condition_blocks must have an entry
# here. Use model: "instant" for conditions where no lag is observed.
#
# Omit this block entirely to use an instant transition everywhere.
growth_transition:
  - condition_pre: "pheS-4CP"
    model: "memory"
    tau0: 90.0    # baseline lag ~90 min; pheS shows a pronounced memory effect
    k1: 5.0       # occupancy has a strong influence on lag for pheS
    k2: 0.2       # keeps denominator finite; sets the curvature near theta=0

  - condition_pre: "kanR-kan"
    model: "memory"
    tau0: 60.0    # shorter baseline lag for kanR
    k1: 2.0       # weaker occupancy-dependence than pheS
    k2: 0.2

# -----------------------------------------------------------------------------
# Data collection parameters

# Total number of reads coming out of the experiment
total_num_reads: 2.5e7

# Fraction of sequencing reads to re-assign to a randomly chosen genotype,
# simulating index hopping / read bleedthrough between samples. Set to None
# or 0 to disable.
prob_index_hop: 0.05

# -----------------------------------------------------------------------------
# Binding data simulation (optional)

# If present, tfs-simulate will also write a binding CSV with columns:
#   genotype, titrant_name, titrant_conc, theta_obs, theta_std
#
# genotypes    : list of genotype strings whose binding curves to simulate
# titrant_name : name of the titrant (must match 'e_name' in observable_calc_kwargs)
# titrant_conc : titrant concentrations in mM at which to evaluate theta
# noise        : standard deviation of Gaussian noise added to each theta value
#
# Genotypes not present in the library are accepted; their ddG values are
# computed directly from the thermodynamic model.
#
# binding_data:
#   genotypes:
#     - wt
#     - A47V
#   titrant_name: iptg
#   titrant_conc: [0, 0.0001, 0.001, 0.003, 0.01, 0.03, 0.1, 0.3, 1.0]
#   noise: 0.02
