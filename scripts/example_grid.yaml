# Grid configuration for create_grid.py
#
# Usage:
#   python scripts/create_grid.py scripts/run_template.srun scripts/example_grid.yaml output/
#
# HOW TO READ THIS FILE
# ---------------------
# Each block contributes exactly one variant per run.  The Cartesian product is
# taken across blocks, so a file with N blocks each having K variants produces
# K^N runs (minus any you comment out).
#
# Single-variant blocks are constants — they don't multiply the run count.
# Multi-variant blocks multiply by the number of active (uncommented) variants.
#
# Multi-key variants move together and are never split:
#   - THETA_MODEL: "hill_mut"
#     DATA_INPUT_FILE: ""      ← these two always travel as a pair
#
# OPTIONAL FLAGS
# --------------
# Boolean CLI flags (--epistasis, --growth_shares_replicates) should be
# expressed as the full flag string or "".  Leave them unquoted in the
# template so an empty value produces no extra argument:
#   {{ EPISTASIS }}   →  --epistasis   or   (nothing)
#
# STRUCT MODELS AND DATA_INPUT_FILE
# ----------------------------------
# DATA_INPUT_FILE is rendered inline in the tfs-configure-growth-analysis call.
# For struct-based theta models set it to the full flag+path string; for
# non-struct models set it to "".
#   DATA_INPUT_FILE: "--struct_ensemble_path ../data/struct_ensemble.h5"
#   DATA_INPUT_FILE: ""
#
# NOTE: ln_cfu0_model and batch_size are valid CLI args not currently in
# run_template.srun.  Add --ln_cfu0_model {{ LN_CFU0_MODEL }} and
# --batch_size {{ BATCH_SIZE }} to the template if you want to vary them.

# Directory name for each run.  Uses Jinja2; values are sanitized for the
# filesystem.  Omit to fall back to sanitized variable values in order.
run_name: "{{ THETA_MODEL }}_cg-{{ CONDITION_GROWTH_MODEL }}_gt-{{ GROWTH_TRANSITION_MODEL }}_act-{{ ACTIVITY_MODEL }}_dk-{{ DK_GENO_MODEL }}_ep{{ 'T' if EPISTASIS else 'F' }}"

output_file: run.srun

blocks:

  # ── Constants (single-variant) ───────────────────────────────────────────────

  - name: seed
    variants:
      - RUN_SEED: "12345"

  - name: input_files
    variants:
      - BINDING_CSV_FILE: "../data/binding.csv"
        GROWTH_CSV_FILE: "../data/growth.csv"
        PREDICT_GENOTYPES_FILE: "../data/predict_genotypes.txt"

  - name: spiked_genotypes
    # Space-separated list of genotypes excluded from congression correction
    variants:
      - SPIKED: "wt M42I H74A K84L"

  # ── Theta model (coupled with DATA_INPUT_FILE) ───────────────────────────────
  # Primary model of operator occupancy θ.
  # Struct models require a path to the structural ensemble; non-struct models
  # set DATA_INPUT_FILE to "" so no --struct_ensemble_path flag is emitted.
  #
  # Struct ensemble (HDF5):  lac_dimer_lnK_mut, lac_dimer_lnK_nn_prior,
  #                          lac_dimer_unfolded_lnK_mut, lac_dimer_unfolded_lnK_nn_prior,
  #                          mwc_dimer_lnK_mut, mwc_dimer_lnK_nn_prior,
  #                          mwc_dimer_unfolded_lnK_mut, mwc_dimer_unfolded_lnK_nn_prior
  # ddG prior CSV:           lac_dimer_lnK_ddG_prior, lac_dimer_unfolded_lnK_ddG_prior,
  #                          mwc_dimer_lnK_ddG_prior, mwc_dimer_unfolded_lnK_ddG_prior

  - name: theta_model
    variants:
      # ── non-struct ──
      #- THETA_MODEL: "hill"
      #  DATA_INPUT_FILE: ""
      - THETA_MODEL: "hill_mut"
        DATA_INPUT_FILE: ""
      # - THETA_MODEL: "categorical"
      #   DATA_INPUT_FILE: ""
      # - THETA_MODEL: "simple"
      #   DATA_INPUT_FILE: ""

      # ── lac dimer ──
      # - THETA_MODEL: "lac_dimer_lnK_mut"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/struct_ensemble.h5"
      # - THETA_MODEL: "lac_dimer_lnK_nn_prior"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/struct_ensemble.h5"
      # - THETA_MODEL: "lac_dimer_lnK_ddG_prior"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/ddG_priors.csv"

      # ── lac dimer unfolded ──
      # - THETA_MODEL: "lac_dimer_unfolded_lnK_mut"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/struct_ensemble.h5"
      # - THETA_MODEL: "lac_dimer_unfolded_lnK_nn_prior"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/struct_ensemble.h5"
      # - THETA_MODEL: "lac_dimer_unfolded_lnK_ddG_prior"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/ddG_priors.csv"

      # ── mwc dimer ──
      # - THETA_MODEL: "mwc_dimer_lnK_mut"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/struct_ensemble.h5"
      # - THETA_MODEL: "mwc_dimer_lnK_nn_prior"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/struct_ensemble.h5"
      # - THETA_MODEL: "mwc_dimer_lnK_ddG_prior"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/ddG_priors.csv"

      # ── mwc dimer unfolded ──
      # - THETA_MODEL: "mwc_dimer_unfolded_lnK_mut"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/struct_ensemble.h5"
      # - THETA_MODEL: "mwc_dimer_unfolded_lnK_nn_prior"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/struct_ensemble.h5"
      # - THETA_MODEL: "mwc_dimer_unfolded_lnK_ddG_prior"
      #   DATA_INPUT_FILE: "--struct_ensemble_path ../data/ddG_priors.csv"

  # ── Condition growth model ───────────────────────────────────────────────────
  # How growth rate varies with θ across conditions.
  # INCOMPATIBLE pairs (will error at configure time):
  #   power    + logit rescale
  #   saturation + logit rescale

  - name: condition_growth_model
    variants:
      - CONDITION_GROWTH_MODEL: "linear"
      # - CONDITION_GROWTH_MODEL: "linear_fixed"
      # - CONDITION_GROWTH_MODEL: "power"        # incompatible with logit rescale
      # - CONDITION_GROWTH_MODEL: "saturation"   # incompatible with logit rescale

  # ── Growth transition model ──────────────────────────────────────────────────
  # Transition between pre-selection and selection growth phases.

  - name: growth_transition_model
    variants:
      - GROWTH_TRANSITION_MODEL: "memory"
      # - GROWTH_TRANSITION_MODEL: "instant"
      # - GROWTH_TRANSITION_MODEL: "baranyi"
      # - GROWTH_TRANSITION_MODEL: "baranyi_k"
      # - GROWTH_TRANSITION_MODEL: "baranyi_tau"
      # - GROWTH_TRANSITION_MODEL: "two_pop"

  # ── Activity model ───────────────────────────────────────────────────────────
  # Per-genotype scalar weighting how strongly θ alters transcription.

  - name: activity_model
    variants:
      - ACTIVITY_MODEL: "fixed"
      # - ACTIVITY_MODEL: "hierarchical"
      - ACTIVITY_MODEL: "hierarchical_mut"
      # - ACTIVITY_MODEL: "horseshoe"
      - ACTIVITY_MODEL: "horseshoe_mut"

  # ── dk_geno model ────────────────────────────────────────────────────────────
  # Pleiotropic per-genotype growth effect independent of θ.

  - name: dk_geno_model
    variants:
      - DK_GENO_MODEL: "hierarchical_mut"
      # - DK_GENO_MODEL: "hierarchical"
      - DK_GENO_MODEL: "fixed"

  # ── Transformation model ─────────────────────────────────────────────────────
  # Correction for read-count transformation bias.

  - name: transformation_model
    variants:
      - TRANSFORMATION_MODEL: "single"
      - TRANSFORMATION_MODEL: "empirical"
      - TRANSFORMATION_MODEL: "logit_norm"

  # ── Theta rescale model ──────────────────────────────────────────────────────
  # Rescaling applied to θ before it enters the growth model.
  # logit is incompatible with condition_growth_model = power or saturation.

  - name: theta_rescale_model
    variants:
      - THETA_RESCALE_MODEL: "passthrough"
      # - THETA_RESCALE_MODEL: "logit"   # incompatible with power/saturation growth

  # ── Noise models ─────────────────────────────────────────────────────────────
  # Stochastic experimental noise in θ from growth and binding assays.

  - name: theta_growth_noise_model
    variants:
      - THETA_GROWTH_NOISE_MODEL: "zero"
      # - THETA_GROWTH_NOISE_MODEL: "beta"

  - name: theta_binding_noise_model
    variants:
      - THETA_BINDING_NOISE_MODEL: "zero"
      # - THETA_BINDING_NOISE_MODEL: "beta"

  # ── Boolean flags ────────────────────────────────────────────────────────────

  - name: epistasis
    # Pairwise epistasis between mutations; only meaningful for *_mut theta/activity models.
    variants:
      - EPISTASIS: "--epistasis"
      - EPISTASIS: ""

  - name: growth_shares_replicates
    # Whether replicates share growth/growth-transition parameters.
    variants:
      - GROWTH_SHARES_REPLICATES: "--growth_shares_replicates"
      # - GROWTH_SHARES_REPLICATES: ""
